$bg = rgba(11,17,19, 1.0)
$panel = rgba(17,25,28, 0.88)
$panel_2 = rgba(24,35,38, 0.90)
$border = rgba(34,48,51, 0.95)
$border_active = rgba(51,184,168, 0.95)
$text = rgba(216,227,224, 1.0)
$text_soft = rgba(164,180,178, 0.90)
$accent = rgba(89,214,197, 1.0)
$yellow = rgba(217,199,107, 1.0)
$info = rgba(94,155,255, 1.0)
$success = rgba(77,186,122, 1.0)
$error = rgba(225,111,115, 1.0)

general {
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/.config/hypr/hyprlock/leenium-hyprlock.png
    blur_passes = 3
    color = $bg
}

animations {
    enabled = true
}

#date lablel
label {
    monitor =
    text = cmd[update:60000] date +"%a, %b %-d"
    color = $text_soft
    font_size = 28
    font_family = jetbrainsmono nerd font
    position = 0, 330
    halign = center
    valign = center
    shadow_passes = 0
}

# time label
label {
    monitor =
    text = cmd[update:1000] date +%H:%M
    color = $accent
    font_size = 96
    font_family = jetbrainsmono nerd font
    position = 0, 240
    halign = center
    valign = center
    shadow_passes = 0
}

# USER-BOX
shape {
    monitor =
    # size = 300, 60
    size = 550, 60
    color = $panel
    rounding = 8
    border_size = 1
    border_color = $border_active
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)
    position = 0, 85
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text =  $USER
    color = $text
    font_size = 20
    font_family = jetbrainsmono nerd font
    position = 0, 85
    halign = center
    valign = center
}

# Authentication Field
input-field {
    monitor =
    size = 550, 60
    position = 0, 0
    halign = center
    valign = center

    inner_color = $panel
    outer_color = $border_active
    outline_thickness = 4

    font_family = jetbrainsmono nerd font
    font_color = $text

    placeholder_text = authenticate
    check_color = $accent
    fail_text = <i>$fail ($attempts)</i>

    rounding = 8
    shadow_passes = 0
    fade_on_empty = false
}

# yubikey label
label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/hyprlock/hyprlock-yubikey-hint
    color = $accent
    font_size = 15
    font_family = jetbrainsmono nerd font
    position = 0, -80
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    # size = 300, 60
    size = 300, 90
    color = $panel_2
    rounding = 15
    border_size = 1
    border_color = $border
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)
    position = 0, 90
    halign = center
    valign = bottom
}

# reboot
label {
    monitor =
    text = 󰜉  
    color = $info
    font_size = 40
    font_family = jetbrainsmono nerd font
    onclick = reboot now
    position = 100, 100
    halign = center
    valign = bottom
}

# power off
label {
    monitor =
    text = 󰐥 
    color = $error
    font_size = 40
    font_family = jetbrainsmono nerd font
    onclick = shutdown now
    position = 0, 100
    halign = center
    valign = bottom
}

# suspend
label {
    monitor =
    text = 󰤄
    color = $success
    font_size = 40
    font_family = jetbrainsmono nerd font
    onclick = systemctl suspend
    position = -100, 100
    halign = center
    valign = bottom
}


# battery — shown only when a battery is present
label {
    monitor =
    text = cmd[update:30000] ~/.config/hypr/hyprlock/battery-status-hyprlock charging
    color = $success
    font_size = 24
    font_family = jetbrainsmono nerd font
    position = 0, 30
    halign = center
    valign = bottom
    shadow_passes = 0
}

label {
    monitor =
    text = cmd[update:30000] ~/.config/hypr/hyprlock/battery-status-hyprlock high
    color = $info
    font_size = 24
    font_family = jetbrainsmono nerd font
    position = 0, 30
    halign = center
    valign = bottom
    shadow_passes = 0
