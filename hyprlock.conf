label {
    monitor =
    text = cmd[update:30000] ~/.config/hypr/hyprlock/battery-status-hyprlock low
    color = $yellow
    font_size = 24
    font_family = jetbrainsmono nerd font
    position = 0, 30
    halign = center
    valign = bottom
    shadow_passes = 0
